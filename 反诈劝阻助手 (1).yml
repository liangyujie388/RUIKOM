        code: "import json\nimport re\n\ndef _extract_json(s: str):\n    if not s:\n\
          \        return {}\n    s = s.strip()\n    try:\n        return json.loads(s)\n\
          \    except Exception:\n        pass\n    m = re.search(r\"\\{.*\\}\", s,\
          \ flags=re.S)\n    if m:\n        try:\n            return json.loads(m.group(0))\n\
          \        except Exception:\n            return {}\n    return {}\n\ndef\
          \ _kb_result_to_text(kb_result):\n    # kb_result: Array[Object] or None\n\
          \    if not kb_result:\n        return \"\"\n    parts = []\n    for item\
          \ in kb_result:\n        if isinstance(item, str):\n            parts.append(item)\n\
          \            continue\n        if not isinstance(item, dict):\n        \
          \    parts.append(str(item))\n            continue\n\n        # 兼容常见字段\n\
          \        for key in [\"content\", \"text\", \"segment\", \"page_content\"\
          , \"chunk\", \"document\"]:\n            v = item.get(key)\n           \
          \ if isinstance(v, str) and v.strip():\n                parts.append(v.strip())\n\
          \                break\n        else:\n            # 尝试更深一层：有的结构是 { \"document\"\
          : { \"content\": \"...\" } }\n            doc = item.get(\"document\")\n\
          \            if isinstance(doc, dict):\n                for key in [\"content\"\
          , \"text\"]:\n                    v = doc.get(key)\n                   \
          \ if isinstance(v, str) and v.strip():\n                        parts.append(v.strip())\n\
          \                        break\n                else:\n                \
          \    parts.append(json.dumps(item, ensure_ascii=False))\n            else:\n\
          \                parts.append(json.dumps(item, ensure_ascii=False))\n\n\
          \    # 去重合并\n    uniq = []\n    seen = set()\n    for p in parts:\n    \
          \    if p not in seen:\n            seen.add(p)\n            uniq.append(p)\n\
          \    return \"\\n\\n\".join(uniq)\n\n# 重点：这些形参名要与你“输入变量名”完全一致（含下划线）\ndef\
          \ main(\n    kb_rule_,\n    kb_llm_,\n    rule_hit,\n    fraud_candidates_rule,\n\
          \    signals_rule,\n    risk_level_rule,\n    text_raw,\n    money_sent,\n\
          \    classifier_text\n):\n    # 1) 选用哪个 KB 检索结果：规则命中优先，否则兜底\n    context_arr\
          \ = kb_rule_ if kb_rule_ else kb_llm_\n    context_text = _kb_result_to_text(context_arr)\n\
          \n    # 2) 规则命中：直接用规则输出；否则解析 classifier_text(JSON)\n    fraud_candidates\
          \ = None\n    signals = None\n    risk_level_hint = risk_level_rule or \"\
