    - data:
        code: "import json, re\n\ndef _safe_json(s):\n    if s is None:\n        return\
          \ {}\n    if isinstance(s, dict):\n        return s\n    if not isinstance(s,\
          \ str):\n        return {}\n    t = s.strip()\n    if not t:\n        return\
          \ {}\n    try:\n        return json.loads(t)\n    except Exception:\n  \
          \      pass\n    m = re.search(r\"\\{.*\\}\", t, flags=re.S)\n    if m:\n\
          \        try:\n            return json.loads(m.group(0))\n        except\
          \ Exception:\n            return {}\n    return {}\n\ndef _as_str(x):\n\
          \    if x is None:\n        return \"\"\n    if isinstance(x, str):\n  \
          \      return x\n    try:\n        return json.dumps(x, ensure_ascii=False)\n\
          \    except Exception:\n        return str(x)\n\n# 形参名要与“输入变量名”一致：classifier_\
          \ / text_raw\ndef main(classifier_: str, text_raw: str):\n    data = _safe_json(classifier_)\n\
          \n    fraud_candidates = data.get(\"fraud_candidates\") or data.get(\"type\"\
          ) or \"未识别到明确类型\"\n    risk_level = data.get(\"risk_level\") or data.get(\"\
          risk\") or \"中\"\n    intent = data.get(\"intent\") or \"诈骗风险研判与劝阻\"\n\n\
          \    key_signals = data.get(\"key_signals\") or data.get(\"signals\") or\
          \ data.get(\"reasons\") or []\n    if isinstance(key_signals, list):\n \
          \       signals = \"；\".join([_as_str(x) for x in key_signals if _as_str(x).strip()])\
          \ or \"（无）\"\n    else:\n        signals = _as_str(key_signals).strip()\
          \ or \"（无）\"\n\n    retrieval_query = \"用户描述：\" + (text_raw or \"\")\n\n\
          \    return {\n        \"fraud_candidates\": _as_str(fraud_candidates),\n\
          \        \"signals\": _as_str(signals),\n        \"risk_level_hint\": _as_str(risk_level),\n\
          \        \"intent\": _as_str(intent),\n        \"retrieval_query\": _as_str(retrieval_query),\n\
          \    }"
